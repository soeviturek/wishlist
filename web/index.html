<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wishlist Price Tracker</title>
<link rel="icon" type="image/png" href="/assets/favicon.png">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
  :root {
    --blue: #2563eb;
    --green: #16a34a;
    --red: #dc2626;
    --gray-50: #f8fafc;
    --gray-100: #f1f5f9;
    --gray-200: #e2e8f0;
    --gray-400: #94a3b8;
    --gray-500: #64748b;
    --gray-700: #334155;
    --gray-900: #0f172a;
    --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--gray-100);
    color: var(--gray-900);
    min-height: 100vh;
  }
  .header {
    background: var(--blue);
    color: white;
    padding: 24px 0;
    text-align: center;
    box-shadow: 0 2px 12px rgba(37,99,235,.25);
  }
  .header h1 { font-size: 24px; font-weight: 700; }
  .header p  { font-size: 14px; opacity: .8; margin-top: 4px; }

  .container { max-width: 800px; margin: 0 auto; padding: 24px 16px; }

  /* --- Track Form --- */
  .card {
    background: white;
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 20px;
    box-shadow: 0 1px 4px rgba(0,0,0,.06);
  }
  .card h2 {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 16px;
    color: var(--gray-700);
  }
  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .form-grid .full { grid-column: 1 / -1; }
  label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--gray-500);
    text-transform: uppercase;
    letter-spacing: .5px;
    margin-bottom: 4px;
  }
  input {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--gray-200);
    border-radius: 8px;
    font-size: 14px;
    transition: border .15s;
  }
  input:focus { outline: none; border-color: var(--blue); box-shadow: 0 0 0 3px rgba(37,99,235,.1); }
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background .15s, opacity .15s;
  }
  .btn:disabled { opacity: .5; cursor: not-allowed; }
  .btn-primary { background: var(--blue); color: white; }
  .btn-primary:hover:not(:disabled) { background: #1d4ed8; }
  .btn-danger  { background: var(--red); color: white; font-size: 12px; padding: 6px 12px; }
  .btn-danger:hover:not(:disabled) { background: #b91c1c; }
  .btn-secondary { background: var(--gray-200); color: var(--gray-700); font-size: 12px; padding: 6px 12px; }
  .btn-secondary:hover:not(:disabled) { background: var(--gray-400); color: white; }

  /* --- Toast --- */
  .toast {
    position: fixed;
    top: 20px;
    right: 20px;
    padding: 12px 20px;
    border-radius: 8px;
    color: white;
    font-size: 14px;
    font-weight: 500;
    z-index: 999;
    animation: slideIn .3s ease;
    box-shadow: 0 4px 12px rgba(0,0,0,.15);
  }
  .toast.success { background: var(--green); }
  .toast.error   { background: var(--red); }
  @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

  /* --- Lookup bar --- */
  .lookup {
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }
  .lookup > div { flex: 1; }

  /* --- Search bar --- */
  .search-bar {
    margin-bottom: 12px;
  }
  .search-bar input {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--gray-200);
    border-radius: 8px;
    font-size: 14px;
  }

  /* --- Pagination --- */
  .pagination {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
    margin-top: 16px;
    font-size: 14px;
    color: var(--gray-500);
  }
  .pagination button {
    padding: 6px 14px;
    border: 1px solid var(--gray-200);
    border-radius: 8px;
    background: white;
    font-size: 13px;
    cursor: pointer;
    transition: background .15s;
  }
  .pagination button:hover:not(:disabled) { background: var(--gray-100); }
  .pagination button:disabled { opacity: .4; cursor: not-allowed; }

  /* --- Items List --- */
  .item-card {
    display: flex;
    gap: 16px;
    padding: 16px;
    border: 1px solid var(--gray-200);
    border-radius: 10px;
    margin-bottom: 12px;
    align-items: center;
    transition: box-shadow .15s;
  }
  .item-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,.06); }
  .item-img {
    width: 64px;
    height: 64px;
    object-fit: contain;
    border-radius: 8px;
    background: var(--gray-50);
    border: 1px solid var(--gray-200);
    flex-shrink: 0;
  }
  .item-info { flex: 1; min-width: 0; }
  .item-name {
    font-weight: 600;
    font-size: 14px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .item-store { font-size: 12px; color: var(--gray-400); margin-top: 2px; }
  .item-price { font-size: 20px; font-weight: 700; color: var(--green); white-space: nowrap; }
  .item-target { font-size: 11px; color: var(--gray-400); }
  .item-actions { display: flex; gap: 6px; flex-shrink: 0; flex-direction: column; }

  /* --- Modal --- */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.4);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: fadeIn .2s;
  }
  @keyframes fadeIn { from { opacity: 0; } }
  .modal {
    background: white;
    border-radius: var(--radius);
    padding: 24px;
    width: 90%;
    max-width: 640px;
    max-height: 85vh;
    overflow-y: auto;
    box-shadow: 0 12px 40px rgba(0,0,0,.2);
  }
  .modal h3 { font-size: 16px; margin-bottom: 16px; }
  .modal canvas { width: 100% !important; height: auto !important; }

  /* --- Loading --- */
  .spinner {
    display: inline-block;
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin .6s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .empty-state {
    text-align: center;
    padding: 40px;
    color: var(--gray-400);
  }
  .empty-state span { font-size: 40px; display: block; margin-bottom: 12px; }

  @media (max-width: 600px) {
    .form-grid { grid-template-columns: 1fr; }
    .item-card { flex-wrap: wrap; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>📉 Wishlist Price Tracker</h1>
  <p>Track prices from Woolworths & Chemist Warehouse</p>
</div>

<div class="container">

  <!-- Track a Product -->
  <div class="card">
    <h2>Track a Product</h2>
    <form id="trackForm">
      <div class="form-grid">
        <div class="full">
          <label for="url">Product URL</label>
          <input type="url" id="url" placeholder="https://www.woolworths.com.au/shop/productdetails/..." required>
        </div>
        <div>
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="you@email.com" required>
        </div>
        <div>
          <label for="target">Target Price (optional)</label>
          <input type="number" id="target" placeholder="e.g. 15.00" step="0.01" min="0">
        </div>
        <div class="full" style="margin-top:4px;">
          <button type="submit" class="btn btn-primary" id="trackBtn">
            Track Product
          </button>
        </div>
      </div>
    </form>
  </div>

  <!-- My Tracked Items -->
  <div class="card">
    <h2>My Tracked Items</h2>
    <div class="lookup" style="margin-bottom:16px;">
      <div>
        <label for="lookupEmail">Email</label>
        <input type="email" id="lookupEmail" placeholder="you@email.com">
      </div>
      <button class="btn btn-primary" id="lookupBtn" style="margin-bottom:1px;">Load</button>
    </div>
    <div class="search-bar" id="searchBar" style="display:none;">
      <label for="searchInput">Search Items</label>
      <input type="text" id="searchInput" placeholder="Type to filter items by name...">
    </div>
    <div id="itemsList">
      <div class="empty-state">
        <span>📋</span>
        Enter your email above to see your tracked items
      </div>
    </div>
    <div class="pagination" id="pagination" style="display:none;"></div>
  </div>

</div>

<!-- Price History Modal -->
<div id="historyModal" class="modal-overlay" style="display:none;" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <h3 id="modalTitle" style="margin:0;">Price History</h3>
      <button class="btn btn-secondary" onclick="closeModal()">✕ Close</button>
    </div>
    <canvas id="historyChart"></canvas>
    <div id="historyTable" style="margin-top:16px;"></div>
  </div>
</div>

<script>
const API = '';  // same origin

// --- Toast ---
function toast(msg, type = 'success') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

// --- Persist email in localStorage ---
const savedEmail = localStorage.getItem('wt_email') || '';
document.getElementById('email').value = savedEmail;
document.getElementById('lookupEmail').value = savedEmail;

// --- Track Form ---
document.getElementById('trackForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('trackBtn');
  const email = document.getElementById('email').value.trim();
  const url = document.getElementById('url').value.trim();
  const target = document.getElementById('target').value;

  if (!email || !url) return;
  localStorage.setItem('wt_email', email);

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Scraping...';

  try {
    const body = { email, url };
    if (target) body.target_price = parseFloat(target);

    const res = await fetch(`${API}/items`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    const data = await res.json();

    if (!res.ok) {
      toast(data.error || 'Failed to track product', 'error');
      return;
    }

    toast(`Now tracking: ${data.name} ($${data.current_price.toFixed(2)})`);
    document.getElementById('url').value = '';
    document.getElementById('target').value = '';
    document.getElementById('lookupEmail').value = email;
    loadItems(email);
  } catch (err) {
    toast('Network error: ' + err.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Track Product';
  }
});

// --- Load items ---
document.getElementById('lookupBtn').addEventListener('click', () => {
  const email = document.getElementById('lookupEmail').value.trim();
  if (email) {
    localStorage.setItem('wt_email', email);
    document.getElementById('email').value = email;
    loadItems(email);
  }
});
document.getElementById('lookupEmail').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('lookupBtn').click();
});

// --- Search & Pagination state ---
let allItems = [];
let currentPage = 1;
const PAGE_SIZE = 10;

document.getElementById('searchInput').addEventListener('input', () => {
  currentPage = 1;
  renderItems();
});

function getFilteredItems() {
  const query = document.getElementById('searchInput').value.trim().toLowerCase();
  if (!query) return allItems;
  return allItems.filter(item => item.name.toLowerCase().includes(query));
}

function renderItems() {
  const container = document.getElementById('itemsList');
  const paginationEl = document.getElementById('pagination');
  const filtered = getFilteredItems();

  if (!filtered.length) {
    const query = document.getElementById('searchInput').value.trim();
    container.innerHTML = query
      ? '<div class="empty-state"><span>🔍</span>No items match your search.</div>'
      : '<div class="empty-state"><span>📭</span>No tracked items yet.<br>Add a product URL above!</div>';
    paginationEl.style.display = 'none';
    return;
  }

  const totalPages = Math.ceil(filtered.length / PAGE_SIZE);
  if (currentPage > totalPages) currentPage = totalPages;
  const start = (currentPage - 1) * PAGE_SIZE;
  const pageItems = filtered.slice(start, start + PAGE_SIZE);

  container.innerHTML = pageItems.map(item => {
    const price = item.current_price != null ? `$${item.current_price.toFixed(2)}` : '—';
    const target = item.target_price ? `Target: $${item.target_price.toFixed(2)}` : '';
    const imgSrc = item.image_url || '';
    const imgTag = imgSrc
      ? `<img class="item-img" src="${imgSrc}" alt="" onerror="this.style.display='none'">`
      : `<div class="item-img" style="display:flex;align-items:center;justify-content:center;font-size:24px;">📦</div>`;

    const muted = item.notified;
    const notifyBadge = muted
      ? `<span style="font-size:11px;background:#fef3c7;color:#92400e;padding:2px 6px;border-radius:4px;">🔕 Muted</span>`
      : `<span style="font-size:11px;background:#dcfce7;color:#166534;padding:2px 6px;border-radius:4px;">🔔 Active</span>`;
    const notifyBtn = muted
      ? `<button class="btn btn-primary" style="font-size:12px;padding:6px 12px;" onclick="toggleNotify('${item.id}')">🔔 Re-enable</button>`
      : `<button class="btn btn-secondary" onclick="toggleNotify('${item.id}')">🔕 Mute</button>`;

    return `
      <div class="item-card" ${muted ? 'style="opacity:.6;"' : ''}>
        ${imgTag}
        <div class="item-info">
          <div class="item-name" title="${esc(item.name)}">${esc(item.name)}</div>
          <div class="item-store">${esc(item.store)} · Added ${new Date(item.created_at).toLocaleDateString()} · ${notifyBadge}</div>
          ${target ? `<div class="item-target">${target}</div>` : ''}
        </div>
        <div class="item-price">${price}</div>
        <div class="item-actions">
          <button class="btn btn-primary" style="font-size:12px;padding:6px 12px;" onclick="showHistory('${item.id}','${esc(item.name)}')">📊 History</button>
          <button class="btn btn-secondary" onclick="editTarget('${item.id}','${esc(item.name)}',${item.target_price || 'null'})">🎯 Target</button>
          ${notifyBtn}
          <button class="btn btn-secondary" onclick="checkNow('${item.id}')">🔄 Check</button>
          <button class="btn btn-danger" onclick="deleteItem('${item.id}','${esc(item.name)}')">🗑 Remove</button>
        </div>
      </div>`;
  }).join('');

  // Pagination controls
  if (totalPages > 1) {
    paginationEl.style.display = 'flex';
    paginationEl.innerHTML = `
      <button onclick="goToPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>Prev</button>
      <span>Page ${currentPage} of ${totalPages}</span>
      <button onclick="goToPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>Next</button>
    `;
  } else {
    paginationEl.style.display = 'none';
  }
}

function goToPage(page) {
  currentPage = page;
  renderItems();
}

async function loadItems(email) {
  const container = document.getElementById('itemsList');
  const searchBar = document.getElementById('searchBar');
  const paginationEl = document.getElementById('pagination');
  container.innerHTML = '<div style="text-align:center;padding:20px;color:var(--gray-400);">Loading...</div>';
  searchBar.style.display = 'none';
  paginationEl.style.display = 'none';

  try {
    const res = await fetch(`${API}/items?email=${encodeURIComponent(email)}`);
    const items = await res.json();

    if (!res.ok) {
      container.innerHTML = `<div class="empty-state"><span>⚠️</span>${items.error}</div>`;
      return;
    }

    allItems = items;
    currentPage = 1;
    document.getElementById('searchInput').value = '';

    if (!items.length) {
      container.innerHTML = '<div class="empty-state"><span>📭</span>No tracked items yet.<br>Add a product URL above!</div>';
      return;
    }

    searchBar.style.display = 'block';
    renderItems();

  } catch (err) {
    container.innerHTML = `<div class="empty-state"><span>⚠️</span>Failed to load: ${err.message}</div>`;
  }
}

function esc(s) { return s ? s.replace(/'/g, '&#39;').replace(/"/g, '&quot;').replace(/</g, '&lt;') : ''; }

// --- Manual check ---
async function checkNow(id) {
  try {
    const res = await fetch(`${API}/items/${id}/check`, { method: 'POST' });
    const data = await res.json();
    if (res.ok) {
      toast(`${data.name}: $${data.current_price.toFixed(2)}${data.notified ? ' (notification sent!)' : ''}`);
      const email = document.getElementById('lookupEmail').value.trim();
      if (email) loadItems(email);
    } else {
      toast(data.error || 'Check failed', 'error');
    }
  } catch (err) {
    toast('Error: ' + err.message, 'error');
  }
}

// --- Edit target price ---
async function editTarget(id, name, currentTarget) {
  const input = prompt(
    `Set target price for "${name}"\n\nEnter a price (e.g. 12.50) or leave empty to remove the target:`,
    currentTarget != null ? currentTarget.toFixed(2) : ''
  );
  if (input === null) return; // cancelled

  const targetPrice = input.trim() === '' ? null : parseFloat(input.trim());
  if (targetPrice !== null && (isNaN(targetPrice) || targetPrice < 0)) {
    toast('Invalid price', 'error');
    return;
  }

  try {
    const res = await fetch(`${API}/items/${id}/target`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ target_price: targetPrice })
    });
    if (res.ok) {
      toast(targetPrice != null ? `Target set to $${targetPrice.toFixed(2)}` : 'Target removed');
      const email = document.getElementById('lookupEmail').value.trim();
      if (email) loadItems(email);
    } else {
      const data = await res.json();
      toast(data.error || 'Update failed', 'error');
    }
  } catch (err) {
    toast('Error: ' + err.message, 'error');
  }
}

// --- Toggle notifications ---
async function toggleNotify(id) {
  try {
    const res = await fetch(`${API}/items/${id}/notify`, { method: 'PATCH' });
    const data = await res.json();
    if (res.ok) {
      toast(data.status === 'muted' ? '🔕 Notifications muted — you won\'t be emailed until you re-enable' : '🔔 Notifications re-enabled');
      const email = document.getElementById('lookupEmail').value.trim();
      if (email) loadItems(email);
    } else {
      toast(data.error || 'Toggle failed', 'error');
    }
  } catch (err) {
    toast('Error: ' + err.message, 'error');
  }
}

// --- Delete ---
async function deleteItem(id, name) {
  if (!confirm(`Remove "${name}" from tracking?\n\nThis will permanently delete all price history and notification records for this item. Even if you re-add it later, the historical data will be gone.`)) return;
  try {
    const res = await fetch(`${API}/items/${id}`, { method: 'DELETE' });
    if (res.ok) {
      toast('Item removed');
      const email = document.getElementById('lookupEmail').value.trim();
      if (email) loadItems(email);
    } else {
      toast('Failed to delete', 'error');
    }
  } catch (err) {
    toast('Error: ' + err.message, 'error');
  }
}

// --- History Modal ---
let chartInstance = null;

async function showHistory(id, name) {
  document.getElementById('historyModal').style.display = 'flex';
  document.getElementById('modalTitle').textContent = name;
  document.getElementById('historyTable').innerHTML = 'Loading...';

  try {
    const res = await fetch(`${API}/items/${id}/history`);
    const history = await res.json();

    if (!history.length) {
      document.getElementById('historyTable').innerHTML = '<p style="color:var(--gray-400);text-align:center;">No price history yet.</p>';
      return;
    }

    // Chart
    const ctx = document.getElementById('historyChart').getContext('2d');
    if (chartInstance) chartInstance.destroy();

    chartInstance = new Chart(ctx, {
      type: 'line',
      data: {
        labels: history.map(h => h.date),
        datasets: [{
          label: 'Price ($)',
          data: history.map(h => h.price),
          borderColor: '#2563eb',
          backgroundColor: 'rgba(37,99,235,.08)',
          fill: true,
          tension: 0.3,
          pointRadius: 4,
          pointBackgroundColor: '#2563eb',
        }]
      },
      options: {
        responsive: true,
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: ctx => `$${ctx.parsed.y.toFixed(2)}`
            }
          }
        },
        scales: {
          y: {
            ticks: { callback: v => '$' + v.toFixed(2) }
          }
        }
      }
    });

    // Table
    const rows = [...history].reverse();
    let html = `<table style="width:100%;border-collapse:collapse;font-size:13px;">
      <tr style="background:var(--gray-50);">
        <th style="text-align:left;padding:6px 10px;border-bottom:2px solid var(--gray-200);">Date</th>
        <th style="text-align:right;padding:6px 10px;border-bottom:2px solid var(--gray-200);">Price</th>
        <th style="text-align:right;padding:6px 10px;border-bottom:2px solid var(--gray-200);">Change</th>
      </tr>`;

    rows.forEach((h, i) => {
      let change = '—';
      if (i < rows.length - 1) {
        const diff = h.price - rows[i + 1].price;
        if (diff < 0) change = `<span style="color:var(--green);">▼ $${(-diff).toFixed(2)}</span>`;
        else if (diff > 0) change = `<span style="color:var(--red);">▲ $${diff.toFixed(2)}</span>`;
      }
      const bg = i % 2 ? 'var(--gray-50)' : 'white';
      html += `<tr style="background:${bg};">
        <td style="padding:6px 10px;border-bottom:1px solid var(--gray-100);">${h.date}</td>
        <td style="text-align:right;padding:6px 10px;border-bottom:1px solid var(--gray-100);font-weight:600;">$${h.price.toFixed(2)}</td>
        <td style="text-align:right;padding:6px 10px;border-bottom:1px solid var(--gray-100);">${change}</td>
      </tr>`;
    });
    html += '</table>';
    document.getElementById('historyTable').innerHTML = html;

  } catch (err) {
    document.getElementById('historyTable').innerHTML = `<p style="color:var(--red);">Error: ${err.message}</p>`;
  }
}

function closeModal() {
  document.getElementById('historyModal').style.display = 'none';
  if (chartInstance) { chartInstance.destroy(); chartInstance = null; }
}

// Escape key closes modal
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// Auto-load if we have a saved email
if (savedEmail) loadItems(savedEmail);
</script>
</body>
</html>
