app = "wishlist-tracker"
primary_region = "syd"

[build]
  dockerfile = "Dockerfile"

[env]
  SERVER_PORT = "8080"
  DATABASE_PATH = "/data/wishlist.db"
  SCHEDULER_CRON = "0 3 * * *"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[mounts]
  source = "wishlist_data"
  destination = "/data"
